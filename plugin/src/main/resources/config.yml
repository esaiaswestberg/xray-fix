# XrayFix Configuration
#
# secret: Server-specific secret used to seed ore placement. Auto-generated on first run.
#   Changing this will cause all newly-loaded chunks to have different ore positions.
#   Keep this value private — if it leaks, seed-based X-ray becomes possible again.
secret: ""

# process_existing_chunks: If true, chunks that were generated before XrayFix was installed
#   will also have their ores replaced when they are next loaded.
#   WARNING: This will strip and re-place ores in ALL loaded chunks that haven't been
#   processed yet. Use with caution on existing worlds.
process_existing_chunks: false

obfuscation:
  enabled: true
  # Y level ceiling for obfuscation. Blocks above this are never hidden (surface is exposed).
  max_y: 64
  max_y_nether: 128
  # Materials randomly substituted for hidden blocks on the client side.
  # Include both stone and deepslate variants for correct depth-based appearance.
  fake_materials:
    - STONE
    - DEEPSLATE
    - COAL_ORE
    - IRON_ORE
    - COPPER_ORE
    - GOLD_ORE
    - DIAMOND_ORE
    - DEEPSLATE_COAL_ORE
    - DEEPSLATE_IRON_ORE
    - DEEPSLATE_COPPER_ORE
    - DEEPSLATE_GOLD_ORE
    - DEEPSLATE_DIAMOND_ORE

  nether_fake_materials:
    - NETHERRACK
    - NETHER_QUARTZ_ORE
    - NETHER_GOLD_ORE
    - ANCIENT_DEBRIS

# Ore group configuration.
# Each entry defines one ore type's placement parameters.
# Multiple entries can share the same ore material (e.g. two iron entries for different Y ranges).
#
# Fields:
#   enabled:          Whether to process this ore group.
#   stone_ore:        Bukkit Material name for the stone/surface variant.
#   deepslate_ore:    Bukkit Material name for the deepslate variant (Y < 0). Leave empty for nether ores.
#   veins_per_chunk:  Number of vein placement attempts per chunk.
#   vein_size:        Maximum blocks per vein (actual count may be lower due to non-host blocks).
#   min_y / max_y:    Y range (inclusive) in which veins can start.
ores:
  coal:
    enabled: true
    stone_ore: COAL_ORE
    deepslate_ore: DEEPSLATE_COAL_ORE
    veins_per_chunk: 20
    vein_size: 14
    min_y: 0
    max_y: 192

  iron_lower:
    enabled: true
    stone_ore: IRON_ORE
    deepslate_ore: DEEPSLATE_IRON_ORE
    veins_per_chunk: 15
    vein_size: 9
    min_y: -24
    max_y: 56

  iron_upper:
    enabled: true
    stone_ore: IRON_ORE
    deepslate_ore: DEEPSLATE_IRON_ORE
    veins_per_chunk: 10
    vein_size: 9
    min_y: 80
    max_y: 256

  gold:
    enabled: true
    stone_ore: GOLD_ORE
    deepslate_ore: DEEPSLATE_GOLD_ORE
    veins_per_chunk: 4
    vein_size: 8
    min_y: -64
    max_y: 32

  copper:
    enabled: true
    stone_ore: COPPER_ORE
    deepslate_ore: DEEPSLATE_COPPER_ORE
    veins_per_chunk: 6
    vein_size: 10
    min_y: -16
    max_y: 96

  lapis:
    enabled: true
    stone_ore: LAPIS_ORE
    deepslate_ore: DEEPSLATE_LAPIS_ORE
    veins_per_chunk: 3
    vein_size: 6
    min_y: -64
    max_y: 64

  redstone:
    enabled: true
    stone_ore: REDSTONE_ORE
    deepslate_ore: DEEPSLATE_REDSTONE_ORE
    veins_per_chunk: 8
    vein_size: 8
    min_y: -64
    max_y: 16

  diamond:
    enabled: true
    stone_ore: DIAMOND_ORE
    deepslate_ore: DEEPSLATE_DIAMOND_ORE
    veins_per_chunk: 1
    vein_size: 7
    min_y: -64
    max_y: -16

  emerald:
    enabled: false
    stone_ore: EMERALD_ORE
    deepslate_ore: DEEPSLATE_EMERALD_ORE
    veins_per_chunk: 2
    vein_size: 3
    min_y: -16
    max_y: 256

  nether_quartz:
    enabled: true
    stone_ore: NETHER_QUARTZ_ORE
    deepslate_ore: ""
    veins_per_chunk: 16
    vein_size: 12
    min_y: 10
    max_y: 117

  nether_gold:
    enabled: true
    stone_ore: NETHER_GOLD_ORE
    deepslate_ore: ""
    veins_per_chunk: 10
    vein_size: 9
    min_y: 10
    max_y: 117

  ancient_debris:
    enabled: true
    stone_ore: ANCIENT_DEBRIS
    deepslate_ore: ""
    veins_per_chunk: 1
    vein_size: 2
    min_y: 8
    max_y: 22
