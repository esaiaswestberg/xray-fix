# X-ray Fix Configuration
#
# secret: Server-specific secret used to seed ore placement. Auto-generated on first run.
#   Changing this will cause all newly-loaded chunks to have different ore positions.
#   Keep this value private - if it leaks, seed-based X-ray becomes possible again.
secret: ""

# process_existing_chunks: If true, chunks that were generated before X-ray Fix was installed
#   will also have their ores replaced when they are next loaded.
#   WARNING: This will strip and re-place ores in ALL loaded chunks that haven't been
#   processed yet. Use with caution on existing worlds.
process_existing_chunks: false

obfuscation:
  enabled: true
  # Y level ceiling for obfuscation. Blocks above this are never hidden (surface is exposed).
  max_y: 64
  max_y_nether: 128
  # Materials randomly substituted for hidden blocks on the client side.
  # Include both stone and deepslate variants for correct depth-based appearance.
  fake_materials:
    - STONE
    - DEEPSLATE
    - COAL_ORE
    - IRON_ORE
    - COPPER_ORE
    - GOLD_ORE
    - DIAMOND_ORE
    - DEEPSLATE_COAL_ORE
    - DEEPSLATE_IRON_ORE
    - DEEPSLATE_COPPER_ORE
    - DEEPSLATE_GOLD_ORE
    - DEEPSLATE_DIAMOND_ORE

  nether_fake_materials:
    - NETHERRACK
    - NETHER_QUARTZ_ORE
    - NETHER_GOLD_ORE
    - ANCIENT_DEBRIS

# World generation configuration.
# Ores are stripped from chunks and re-placed using a secret-seeded RNG so that
# ore positions are not derivable from the world seed.
#
# Sections: overworld, the_nether, the_end
#
# Per-section fields:
#   vanilla_generation: If true, uses Minecraft's internal ore placement algorithm seeded from
#     the server secret instead of the world seed. Vein sizes and counts match vanilla values.
#     If false (or omitted), ores are stripped but not re-placed (obfuscation-only mode).
#
#   ores: List of ore types to manage. Each entry must have:
#     stone_ore:    Bukkit Material name for the stone/surface variant.
#     deepslate_ore: Bukkit Material name for the deepslate variant (Y < 0). Omit for nether ores.
world_generation:
  overworld:
    vanilla_generation: true
    ores:
      - stone_ore: COAL_ORE
        deepslate_ore: DEEPSLATE_COAL_ORE
      - stone_ore: IRON_ORE
        deepslate_ore: DEEPSLATE_IRON_ORE
      - stone_ore: GOLD_ORE
        deepslate_ore: DEEPSLATE_GOLD_ORE
      - stone_ore: COPPER_ORE
        deepslate_ore: DEEPSLATE_COPPER_ORE
      - stone_ore: LAPIS_ORE
        deepslate_ore: DEEPSLATE_LAPIS_ORE
      - stone_ore: REDSTONE_ORE
        deepslate_ore: DEEPSLATE_REDSTONE_ORE
      - stone_ore: DIAMOND_ORE
        deepslate_ore: DEEPSLATE_DIAMOND_ORE

  the_nether:
    vanilla_generation: true
    ores:
      - stone_ore: NETHER_QUARTZ_ORE
      - stone_ore: NETHER_GOLD_ORE
      - stone_ore: ANCIENT_DEBRIS

  the_end:
    ores: []
