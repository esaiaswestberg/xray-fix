name: Release

on:
  release:
    types: [created]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.read-versions.outputs.versions }}
      plugin-version: ${{ steps.plugin-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read target versions
        id: read-versions
        run: echo "versions=$(jq -c '.' assets/target-versions.json)" >> $GITHUB_OUTPUT

      - name: Extract plugin version from tag
        id: plugin-version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        mc-version: ${{ fromJson(needs.prepare.outputs.versions) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set plugin version
        working-directory: plugin
        run: mvn versions:set -DnewVersion=${{ needs.prepare.outputs.plugin-version }} -q

      - name: Build
        working-directory: plugin
        run: mvn clean package -Dmc.version=${{ matrix.mc-version }} -q

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ needs.prepare.outputs.plugin-version }}
          MC_VERSION=${{ matrix.mc-version }}
          cp "plugin/target/xrayfix-${VERSION}.jar" "xrayfix-v${VERSION}-mc${MC_VERSION}.jar"
          gh release upload ${{ github.ref_name }} "xrayfix-v${VERSION}-mc${MC_VERSION}.jar"
