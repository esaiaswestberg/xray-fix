name: Release

on:
  release:
    types: [created]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.read-versions.outputs.versions }}
      plugin-version: ${{ steps.plugin-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read target versions
        id: read-versions
        run: echo "versions=$(jq -c '.' assets/target-versions.json)" >> $GITHUB_OUTPUT

      - name: Extract plugin version from tag
        id: plugin-version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        mc-version: ${{ fromJson(needs.prepare.outputs.versions) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set plugin version
        working-directory: plugin
        run: mvn versions:set -DnewVersion=${{ needs.prepare.outputs.plugin-version }} -q

      - name: Build
        working-directory: plugin
        run: |
          MC_VERSION="${{ matrix.mc-version }}"
          MC_API_VERSION=$(echo "$MC_VERSION" | cut -d. -f1-2)
          MC_MAJOR=$(echo "$MC_VERSION" | cut -d. -f1)
          MC_MINOR=$(echo "$MC_VERSION" | cut -d. -f2)
          MC_PATCH=$(echo "$MC_VERSION" | cut -d. -f3); MC_PATCH=${MC_PATCH:-0}
          if [ "$MC_MAJOR" -ne 1 ] 2>/dev/null || [[ ! "$MC_VERSION" =~ \. ]]; then
            MC_JAVA_VERSION=21
          elif [ "$MC_MINOR" -ge 21 ] || { [ "$MC_MINOR" -eq 20 ] && [ "$MC_PATCH" -ge 5 ]; }; then
            MC_JAVA_VERSION=21
          elif [ "$MC_MINOR" -ge 18 ]; then
            MC_JAVA_VERSION=17
          elif [ "$MC_MINOR" -eq 17 ]; then
            MC_JAVA_VERSION=16
          else
            MC_JAVA_VERSION=8
          fi
          mvn clean package -Dmc.version=$MC_VERSION -Dmc.api-version=$MC_API_VERSION -Dmc.java-version=$MC_JAVA_VERSION -q

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ needs.prepare.outputs.plugin-version }}
          MC_VERSION=${{ matrix.mc-version }}
          cp "plugin/target/xrayfix-${VERSION}.jar" "xrayfix-v${VERSION}-mc${MC_VERSION}.jar"
          gh release upload ${{ github.ref_name }} "xrayfix-v${VERSION}-mc${MC_VERSION}.jar"

      - uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: ${{ vars.MODRINTH_ID }}
          version: ${{ needs.prepare.outputs.plugin-version }}+mc${{ matrix.mc-version }}
          name: ${{ github.event.release.name }}
          changelog: ${{ github.event.release.body }}
          loaders: |-
            paper
            spigot
            bukkit
            purpur
            folia
          game-versions: ${{ matrix.mc-version }}
          files: xrayfix-v${{ needs.prepare.outputs.plugin-version }}-mc${{ matrix.mc-version }}.jar
